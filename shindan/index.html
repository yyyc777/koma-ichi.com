<style>
:root {
  --greige:#C8B8A2;--greige-light:#EDE4D8;--greige-pale:#F7F2EC;
  --navy:#2C3E5C;--navy-light:#3D5278;--brown:#5C3D2E;
  --text:#2A2420;--text-muted:#7A6E67;--white:#FDFAF6;
  --komachi-bubble:#FFF8F0;--user-bubble:#EEF2F8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-padding-top: 90px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--greige-pale);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px}

#hero{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center}
.hero-img-wrap{width:100%;position:relative;overflow:hidden}
.hero-img-wrap img{width:100%;display:block;object-fit:cover;max-height:360px;object-position:center 15%}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(44,62,92,0.1) 0%,rgba(44,62,92,0.0) 25%,rgba(44,62,92,0.55) 65%,rgba(44,62,92,0.9) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 24px 28px;
}
.hero-series{font-size:11px;letter-spacing:0.15em;color:rgba(255,255,255,0.75);margin-bottom:6px;font-weight:500}
.hero-title{font-family:'Noto Serif JP',serif;font-size:15px;color:rgba(255,255,255,0.9);font-weight:400;line-height:1.5;margin-bottom:4px}
.hero-title-main{font-family:'Noto Serif JP',serif;font-size:26px;color:#fff;font-weight:600;line-height:1.3;margin-bottom:10px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.82);line-height:1.7}
.hero-cta-wrap{width:100%;padding:20px 24px}
.hero-cta{display:block;width:100%;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:18px;font-size:15px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;text-align:center;letter-spacing:0.03em;transition:background 0.2s,transform 0.15s}
.hero-cta:hover{background:var(--navy-light);transform:translateY(-1px)}
.hero-cta:active{transform:scale(0.98)}
.hero-note{font-size:12px;color:var(--text-muted);text-align:center;margin-top:10px}

.diagnosis-topbar{width:100%;background:var(--white);border-bottom:1px solid var(--greige-light);position:sticky;top:0;z-index:20;display:none;}
.header{width:100%;background:transparent;border-bottom:none;padding:14px 24px 8px;display:flex;align-items:center;gap:10px;position:static;}
.header-title{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--navy);font-weight:600;letter-spacing:0.05em}
.header-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.progress-wrap{width:100%;max-width:480px;padding:0 24px 14px;display:block;margin:0 auto;}
.progress-label{font-size:10px;color:var(--text-muted);margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar{height:2px;background:var(--greige-light);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--greige);border-radius:2px;transition:width 0.5s ease}

.chat-area{width:100%;max-width:480px;padding:28px 24px 0;display:none;flex-direction:column;gap:20px}
.chat-area::before{content:"";display:block;height:4px;flex-shrink:0}
.komachi-row{display:flex;align-items:flex-end;gap:10px;opacity:0;transform:translateY(10px);transition:opacity 0.4s ease,transform 0.4s ease}
.komachi-row.visible{opacity:1;transform:translateY(0)}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;border:2px solid var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.1);overflow:hidden;background:var(--greige-light)}
.avatar img{width:100%;height:100%;object-fit:cover}
.komachi-bubble{background:var(--komachi-bubble);border:1px solid var(--greige-light);border-radius:18px 18px 18px 4px;padding:14px 18px;font-size:15px;line-height:1.7;color:var(--text);max-width:calc(100% - 56px)}
.komachi-name{font-size:10px;color:var(--text-muted);margin-bottom:4px;font-weight:500}
.choices-row{display:flex;flex-direction:column;gap:10px;padding-left:50px;opacity:0;transform:translateY(8px);transition:opacity 0.4s ease 0.2s,transform 0.4s ease 0.2s}
.choices-row.visible{opacity:1;transform:translateY(0)}
.choice-btn{background:var(--white);border:1.5px solid var(--greige);border-radius:12px 12px 12px 4px;padding:14px 18px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);cursor:pointer;text-align:left;line-height:1.6;transition:all 0.2s ease}
.choice-btn:hover{background:var(--greige-pale);transform:translateX(3px)}
.choice-btn:active{transform:scale(0.98)}
.choice-btn.selected{background:var(--user-bubble);border-color:var(--navy-light);color:var(--navy)}
.user-row{display:flex;justify-content:flex-end;opacity:0;transform:translateY(8px);transition:opacity 0.35s ease,transform 0.35s ease}
.user-row.visible{opacity:1;transform:translateY(0)}
.user-bubble{background:var(--navy);color:#fff;border-radius:18px 18px 4px 18px;padding:12px 18px;font-size:14px;line-height:1.6;max-width:80%}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-left:50px;opacity:0;transform:translateY(8px);transition:opacity 0.4s ease 0.2s,transform 0.4s ease 0.2s}
.choices-grid.visible{opacity:1;transform:translateY(0)}
.choices-grid .choice-btn{border-radius:10px;font-size:13px;padding:12px 14px}
.typing{display:flex;gap:4px;padding:14px 18px;background:var(--komachi-bubble);border:1px solid var(--greige-light);border-radius:18px 18px 18px 4px;width:fit-content}
.typing span{width:6px;height:6px;background:var(--greige);border-radius:50%;animation:dot 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-4px);opacity:1}}

.loading{width:100%;max-width:480px;padding:48px 24px;display:none;flex-direction:column;align-items:center;gap:16px}
.loading-dots{display:flex;gap:8px}
.loading-dots span{width:8px;height:8px;background:var(--greige);border-radius:50%;animation:dot 1.2s infinite}
.loading-dots span:nth-child(2){animation-delay:0.2s}
.loading-dots span:nth-child(3){animation-delay:0.4s}
.loading-text{font-size:14px;color:var(--text-muted);font-family:'Noto Serif JP',serif}
</style>
</head>
<body>

<div id="hero">
  <div class="hero-img-wrap">
    <img src="../assets/images/keyvisual.webp" alt="こまちとイチさん" width="1080" height="1080" fetchpriority="high">
    <div class="hero-overlay">
      <div class="hero-series">転職前に読む漫画｜こまちとイチさん</div>
      <div class="hero-title">今の仕事、このままでいい？</div>
      <div class="hero-title-main">転職前のモヤモヤ診断</div>
      <div class="hero-sub">4つの質問で、今のあなたの状態を一緒に整理します。</div>
    </div>
  </div>
  <div class="hero-cta-wrap">
    <button class="hero-cta" onclick="startDiagnosis()">今のモヤモヤを整理する →</button>
    <div class="hero-note">登録不要・無料・約1分</div>
  </div>
</div>

<div class="diagnosis-topbar" id="diagnosis-topbar">
  <div class="header" id="header">
    <div>
      <div class="header-title">転職前モヤモヤ診断</div>
      <div class="header-sub">転職する前に、まず整理</div>
    </div>
  </div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Q1 / 4</span>
      <span id="progress-pct">25%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:25%"></div>
    </div>
  </div>
</div>

<div class="chat-area" id="chat-area"></div>

<div class="loading" id="loading">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <div class="loading-text">イチさんと一緒に、結果を整理しています…</div>
</div>

<script>
const questions = [
  {id:'q1',text:'今の仕事で、何がつらいか言葉にできていますか？',type:'binary',choices:[
    {label:'まだ、なんとなくモヤモヤしています',value:'A'},
    {label:'はい、ある程度わかっています',value:'B'}
  ]},
  {id:'q2',text:'今の状況を変えるために、何か動き始めていますか？',type:'binary',choices:[
    {label:'まだ一歩が出ていません',value:'A'},
    {label:'情報収集などは始めています',value:'B'}
  ]},
  {id:'q3',text:'今、一番気になっていることを教えてください',type:'grid',choices:[
    {label:'次の仕事のこと',value:'B'},
    {label:'収入や生活のこと',value:'A'},
    {label:'自分のスキルのこと',value:'D'},
    {label:'職場への言い出し方',value:'C'}
  ]},
  {id:'q4',text:'今、一番欲しいのはどれですか？',type:'grid',choices:[
    {label:'背中を押してほしい',value:'A'},
    {label:'まず話を聞いてほしい',value:'B'},
    {label:'具体的なアドバイスが欲しい',value:'C'},
    {label:'一人で考える時間が欲しい',value:'D'}
  ]}
];

const resultURLs = {
  BB: 'https://koma-ichi.com/result/ready',
  AB: 'https://koma-ichi.com/result/clarity',
  BA: 'https://koma-ichi.com/result/step',
  AA: 'https://koma-ichi.com/result/reflect'
};

let answers = {};
const chatArea = document.getElementById('chat-area');

function startDiagnosis() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('diagnosis-topbar').style.display = 'block';
  chatArea.style.display = 'flex';
  window.scrollTo({top: 0, behavior: 'auto'});
  runDiagnosis();
}

function updateProgress(step) {
  const pct = Math.round((step/4)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = 'Q'+step+' / 4';
  document.getElementById('progress-pct').textContent = pct+'%';
}

function addKomachi(text) {
  return new Promise(resolve => {
    const typingRow = document.createElement('div');
    typingRow.className = 'komachi-row visible';
    typingRow.innerHTML = '<div class="avatar"><img src="../assets/images/icon_komachi.webp" alt="こまち" width="40" height="40" loading="lazy" decoding="async"></div><div class="typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(typingRow);
    scrollBottom();
    setTimeout(() => {
      typingRow.remove();
      const row = document.createElement('div');
      row.className = 'komachi-row';
      row.innerHTML = '<div class="avatar"><img src="../assets/images/icon_komachi.webp" alt="こまち" width="40" height="40" loading="lazy" decoding="async"></div><div class="komachi-bubble"><div class="komachi-name">こまち</div>'+text+'</div>';
      chatArea.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => { row.classList.add('visible'); scrollBottom(); resolve(); }));
    }, 900);
  });
}

function addChoices(q) {
  return new Promise(resolve => {
    const isGrid = q.type === 'grid';
    const wrap = document.createElement('div');
    wrap.className = isGrid ? 'choices-grid' : 'choices-row';
    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.label;
      btn.addEventListener('click', () => {
        wrap.querySelectorAll('.choice-btn').forEach(b => { b.disabled=true; b.style.opacity='0.4'; b.style.cursor='default'; b.style.transform='none'; });
        btn.style.opacity='1'; btn.classList.add('selected');
        answers[q.id] = c.value;
        setTimeout(() => {
          const userRow = document.createElement('div');
          userRow.className = 'user-row';
          userRow.innerHTML = '<div class="user-bubble">'+c.label+'</div>';
          chatArea.appendChild(userRow);
          requestAnimationFrame(() => requestAnimationFrame(() => { userRow.classList.add('visible'); scrollBottom(); resolve(c.value); }));
        }, 200);
      });
      wrap.appendChild(btn);
    });
    chatArea.appendChild(wrap);
    requestAnimationFrame(() => requestAnimationFrame(() => { wrap.classList.add('visible'); scrollBottom(); }));
  });
}

function scrollBottom() {
  setTimeout(() => {
    const topbar = document.getElementById('diagnosis-topbar');
    const topbarH = topbar ? topbar.offsetHeight : 0;
    const target = document.documentElement.scrollHeight - window.innerHeight + topbarH;
    window.scrollTo({top: Math.max(0, target), behavior: 'smooth'});
  }, 80);
}

function redirect() {
  const typeKey = (answers.q1||'A') + (answers.q2||'A');
  const q3 = answers.q3 || 'A';
  const q4 = answers.q4 || 'A';
  const base = resultURLs[typeKey] || resultURLs['AA'];
  chatArea.style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  scrollBottom();
  const params = new URLSearchParams({q3:q3, q4:q4});
  setTimeout(() => { window.location.href = base + '?' + params.toString(); }, 1200);
}

async function runDiagnosis() {
  await addKomachi('はじめまして、こまちです。');
  await new Promise(r=>setTimeout(r,600));
  await addKomachi('今の状態を一緒に整理していきましょう。');
  await new Promise(r=>setTimeout(r,400));
  for(let i=0;i<questions.length;i++) {
    updateProgress(i+1);
    await addKomachi(questions[i].text);
    await addChoices(questions[i]);
    if(i<questions.length-1) await new Promise(r=>setTimeout(r,600));
  }
  await new Promise(r=>setTimeout(r,500));
  await addKomachi('ありがとうございます。<br>ここからはイチさんと一緒に、今の状態を整理していきますね。');
  await new Promise(r=>setTimeout(r,800));
  redirect();
}
</script>
</body>
</html>
